name: Publish to npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false # never use caching in release builds
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm publish
